logging:
  config: classpath:logback.xml
netgrif:
  engine:
    data:
      drop: false
      database-name: nae
      rest:
        base-path: /api
        detection-strategy: annotated
      mongodb:
        uri: ${NETGRIF_ENGINE_DATA_MONGODB_URI:mongodb://localhost:27017}
        auto-index-creation: true
      elasticsearch:
        url: ${NETGRIF_ENGINE_DATA_ELASTIC_URL:localhost}
        port: ${NETGRIF_ENGINE_DATA_ELASTIC_PORT:9300}
        searchPort: ${NETGRIF_ENGINE_DATA_ELASTIC_SEARCH_PORT:9200}
    jackson:
      default-property-inclusion: non_null
      serialization:
        write-dates-as-timestamps: true
    servlet:
      multipart:
        max-file-size: 50MB
        max-request-size: 50MB
    mail:
      mail-from: ${NETGRIF_ENGINE_MAIL_FROM:test@example.com}
      default-encoding: UTF-8
      host: ${NETGRIF_ENGINE_MAIL_HOST:''}
      port: ${NETGRIF_ENGINE_MAIL_PORT:25}
      jndi-name:
        spring:
          mail:
            username: ${NETGRIF_ENGINE_MAIL_USERNAME:''}
            password: ${NETGRIF_ENGINE_MAIL_PASSWORD:''}
      redirect-to:
        domain: ${NETGRIF_ENGINE_MAIL_REDIRECT_TO_DOMAIN:localhost}
        port: ${NETGRIF_ENGINE_MAIL_REDIRECT_TO_PORT:4200}
        ssl: ${NETGRIF_ENGINE_MAIL_REDIRECT_TO_SSL:false}